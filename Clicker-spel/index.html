<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--ta bort ksk-->
    <title>Click Clicker</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!--<header>
        <h1>Click Clicker</h1>
    </header>-->

    <section id="welcome-window" class="window"><div class="border-wrap-1"><div class="border-wrap-2">
        <div class="windowhead">
            <div class="window-head-title">
                <p>Welcome</p>
            </div>
            <div class="window-head-buttons">
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">--</div></div></div>
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">O</div></div></div>
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">X</div></div></div>
            </div>
        </div>
        
        <div id="welcome">
            <h1>Welcome to Click Clicker</h1>
            <div class="border-wrap-8"><div class="border-wrap-5"><div class="border-wrap-6">
                <div id="click-target">Click</div>
            </div></div></div>
        </div>
    </div></div></section>

    <section id="upgrades-window" class="window"><div class="border-wrap-1"><div class="border-wrap-2">
        <div class="windowhead">
            <div class="window-head-title">
                <p>Upgrades</p>
            </div>
            <div class="window-head-buttons">
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">--</div></div></div>
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">O</div></div></div>
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">X</div></div></div>
            </div>
        </div>
        
        <!--<div id="upgrade-type-select">
            <div id="click-upgrades-select"></div>
            <div id="autoclicker-upgrades-select"></div>
        </div>-->
        <div id="upgrades" class="window-content"><div class="border-wrap-3"><div class="border-wrap-4">
            <div id="click-upgrades">
                <div class="border-wrap-7"><div class="upgrade" id="clickPowerUpgrade">
                    <h3>+1 Click Power</h3>
                    <p class="price"></p>
                </div></div>
            </div>
            <div id="autoclicker-upgrades">
                <div class="border-wrap-7"><div class="upgrade" id="autoclicker">
                    <h3>+1 Autoclicker</h3>
                    <p class="price"></p>
                </div></div>
                <div class="border-wrap-7"><div class="upgrade" id="autoclickIntervalUpgrade">
                    <h3>Autoclick Interval -10%</h3>
                    <p class="price"></p>
                </div></div>
            </div>
        </div></div></div>

    </div></div></section>

    <section id="stats-window" class="window"><div class="border-wrap-1"><div class="border-wrap-2">
        <div class="windowhead">
            <div class="window-head-title">
                <p>Statistics</p>
            </div>
            <div class="window-head-buttons">
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">--</div></div></div>
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">O</div></div></div>
                <div class="border-wrap-5"><div class="border-wrap-6"><div class="window-head-button">X</div></div></div>
            </div>
        </div>

        <div id="stats" class="window-content"><div class="border-wrap-3"><div class="border-wrap-4">
            <table>
                <tr id="score"><td>Clicks:</td><td></td></tr>
                <tr id="clicks-per-second"><td>Per Second:</td><td></td></tr>
                <tr id="points-per-click"><td>Click Power:</td><td></td></tr>
                <tr id="autoclickers"><td>Autoclickers:</td><td></td></tr>
                <tr id="autoclicks-per-second"><td>Autoclick Speed:</td><td></td></tr>
            </table>
        </div></div></div>
    </div></div></section>




    <div id="message-area"></div>

</body>
<footer>
    <div id="test"></div>
    <div id="flexdiv">
        <div class="border-wrap-8"><div class="border-wrap-5"><div class="border-wrap-6">
         <div id="save-button">Save Progress</div>
      </div></div></div>
       <div class="border-wrap-8"><div class="border-wrap-5"><div class="border-wrap-6">
           <div id="reset-button">Reset Progress</div>
       </div></div></div>
    </div>
</footer>
</html>
