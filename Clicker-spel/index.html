<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--ta bort ksk-->
    <title>Click Clicker</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!--<header>
        <h1>Click Clicker</h1>
    </header>-->

    <section id="welcome-window" class="window"><div class="border-wrap-1"><div class="border-wrap-2">
        <div class="windowhead">
            <div class="window-head-title">
                <p>Welcome</p>
            </div>
            <div class="window-head-buttons">
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">--</div></div></div>
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">O</div></div></div>
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">X</div></div></div>
            </div>
        </div>
        <div id="welcome">
            <h1>Welcome to Click Clicker</h1>
        </div>
    </div></div></section>

    <section id="upgrades-window" class="window"><div class="border-wrap-1"><div class="border-wrap-2">
        <div class="windowhead">
            <div class="window-head-title">
                <p>Upgrades</p>
            </div>
            <div class="window-head-buttons">
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">--</div></div></div>
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">O</div></div></div>
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">X</div></div></div>
            </div>
        </div>
        
        <!--<div id="upgrade-type-select">
            <div id="click-upgrades-select"></div>
            <div id="autoclicker-upgrades-select"></div>
        </div>-->
        <div class="border-wrap-3"><div class="border-wrap-4"><div id="upgrades" class="window-content">
            <div id="click-upgrades">
                <div class="upgrade" id="clickPowerUpgrade">
                    <h3>+1 Click Power</h3>
                    <p class="price"></p>
                </div>
            </div>
            <div id="autoclicker-upgrades">
                <div class="upgrade" id="autoclicker">
                    <h3>+1 Autoclicker</h3>
                    <p class="price"></p>
                </div>
                <div class="upgrade" id="autoclickIntervalUpgrade">
                    <h3>Autoclick Interval -10%</h3>
                    <p class="price"></p>
                </div>
            </div>
        </div></div></div>

    </div></div></section>

    <section id="stats-window" class="window"><div class="border-wrap-1"><div class="border-wrap-2">
        <div class="windowhead">
            <div class="window-head-title">
                <p>Statistics</p>
            </div>
            <div class="window-head-buttons">
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">--</div></div></div>
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">O</div></div></div>
                <div class="border-wrap-1"><div class="border-wrap-2"><div class="window-head-button">X</div></div></div>
            </div>
        </div>

        <div class="border-wrap-3"><div class="border-wrap-4"><div id="stats" class="window-content">
            <div id="score"></div>
            <div id="clicks-per-second"></div>
            <div id="points-per-click"></div>
    
            <div id="autoclickers"></div>
            <div id="autoclicks-per-second"></div>
        </div></div></div>
    </div></div></section>



    <div id="click-target">Click</div>
    <div id="message-area"></div>
    <button id="reset">Reset<Br>Progress</button>
    <div id="foot"></div>
</body>
</html>
